name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Clona repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Instala Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. Instala dependencias
      - name: Install dependencies
        run: npm install

      # 4. Ejecuta tests
      - name: Run tests
        run: npm test

      # 5. Ejecuta coverage
      - name: Run coverage
        run: npm run coverage
